<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center">

<div class="card bg-base-100 shadow-xl p-6 w-full max-w-4xl">

  <h1 class="text-3xl font-bold text-center mb-6">🛒 Potvrda narudžbe</h1>

  <!-- FORM -->
  <div id="form">

    <!-- PODACI -->
    <div class="grid grid-cols-2 gap-3">
      <input id="name" class="input input-bordered col-span-2" placeholder="Ime i prezime">
      <input id="email" class="input input-bordered" placeholder="Email">
      <input id="city" class="input input-bordered" placeholder="Grad">
      <input id="address" class="input input-bordered col-span-2" placeholder="Adresa">
    </div>

    <!-- DOSTAVA -->
    <div class="mt-4">
      <h3 class="font-bold mb-2">Način dostave</h3>

      <select id="delivery" class="select select-bordered w-full">
        <option value="standard">Standard (2-4 dana) - 3€</option>
        <option value="express">Express (24h) - 7€</option>
      </select>
    </div>

    <!-- PLAĆANJE -->
    <div class="mt-4">
      <h3 class="font-bold mb-2">Način plaćanja</h3>

      <select id="payment" class="select select-bordered w-full" onchange="togglePayment()">
        <option value="card">Kartica</option>
        <option value="cash">Pouzeće</option>
        <option value="paypal">PayPal</option>
      </select>
    </div>

    <!-- KARTICA -->
    <div id="cardBox" class="mt-3">
      <input class="input input-bordered w-full mb-2" placeholder="Broj kartice">
      <div class="grid grid-cols-2 gap-2">
        <input class="input input-bordered" placeholder="MM/YY">
        <input class="input input-bordered" placeholder="CVV">
      </div>
    </div>

    <!-- PAYPAL -->
    <div id="paypalBox" class="hidden mt-3 p-3 bg-base-200 rounded">
      PayPal plaćanje će biti obrađeno nakon potvrde.
    </div>

    <!-- DUGME -->
    <button onclick="submitOrder()"
      class="btn btn-success w-full mt-6">
      Potvrdi narudžbu
    </button>

  </div>

  <!-- POTVRDA -->
  <div id="done" class="hidden text-center">

    <div class="text-5xl">✅</div>

    <h2 class="text-2xl font-bold text-success mt-2">
      Narudžba uspješna!
    </h2>

    <p class="mt-2 text-sm">Hvala na kupnji 🎉</p>

    <div class="bg-base-200 p-4 rounded mt-4 text-left">

      <p><b>Broj narudžbe:</b> <span id="orderId"></span></p>
      <p><b>Datum:</b> <span id="date"></span></p>
      <p><b>Kupac:</b> <span id="cName"></span></p>
      <p><b>Email:</b> <span id="cEmail"></span></p>
      <p><b>Dostava:</b> <span id="cDelivery"></span></p>
      <p><b>Plaćanje:</b> <span id="cPayment"></span></p>

    </div>

    <div id="orderList" class="mt-4 space-y-2 text-left"></div>

    <div class="text-right mt-4 text-xl font-bold">
      Ukupno: <span id="total"></span> €
    </div>

    <button onclick="goHome()"
      class="btn btn-primary w-full mt-6">
      Povratak u trgovinu
    </button>

  </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function togglePayment() {
  const p = document.getElementById("payment").value;

  document.getElementById("cardBox").style.display = p === "card" ? "block" : "none";
  document.getElementById("paypalBox").style.display = p === "paypal" ? "block" : "none";
}

function submitOrder() {

  if (cart.length === 0) return alert("Košarica je prazna!");

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const delivery = document.getElementById("delivery").value;
  const payment = document.getElementById("payment").value;

  if (!name || !email) return alert("Unesite podatke!");

  // ORDER ID
  const orderId = "ORD-" + Math.floor(Math.random() * 100000);

  document.getElementById("orderId").textContent = orderId;
  document.getElementById("date").textContent = new Date().toLocaleString();

  document.getElementById("cName").textContent = name;
  document.getElementById("cEmail").textContent = email;

  document.getElementById("cDelivery").textContent =
    delivery === "standard" ? "Standard (2-4 dana)" : "Express (24h)";

  document.getElementById("cPayment").textContent =
    payment === "card" ? "Kartica" :
    payment === "cash" ? "Pouzeće" : "PayPal";

  // CART LIST
  const list = document.getElementById("orderList");
  list.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price * item.quantity;

    list.innerHTML += `
      <div class="flex justify-between border-b py-1">
        ${item.name} (${item.size}) x${item.quantity}
        <b>${item.price * item.quantity} €</b>
      </div>
    `;
  });

  document.getElementById("total").textContent = total;

  // UI SWITCH
  document.getElementById("form").classList.add("hidden");
  document.getElementById("done").classList.remove("hidden");

  localStorage.removeItem("cart");
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
